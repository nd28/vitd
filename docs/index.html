<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vitd — Vitamin D Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1b26;--surface:#24283b;--border:#3b4261;
  --fg:#c0caf5;--dim:#565f89;--bright:#a9b1d6;
  --green:#9ece6a;--yellow:#e0af68;--red:#f7768e;--blue:#7aa2f7;--cyan:#7dcfff;--magenta:#bb9af7;
}
body{background:var(--bg);color:var(--fg);font-family:'JetBrains Mono','Fira Code','Cascadia Code','SF Mono',Consolas,monospace;font-size:14px;height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header .logo{font-size:18px;font-weight:700;color:var(--cyan)}
header .logo span{color:var(--yellow)}
header .subtitle{color:var(--dim);font-size:12px}
header .sync-status{margin-left:auto;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:6px}
header .sync-status .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
header .sync-status .dot.ok{background:var(--green)}
header .sync-status .dot.err{background:var(--red)}
header .sync-status .dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#terminal{flex:1;overflow-y:auto;padding:16px 20px;line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
#terminal .line{min-height:1.7em}
#terminal .prompt{color:var(--cyan);user-select:none}
.green{color:var(--green)}.yellow{color:var(--yellow)}.red{color:var(--red)}.blue{color:var(--blue)}.cyan{color:var(--cyan)}.dim{color:var(--dim)}.bold{font-weight:700}.magenta{color:var(--magenta)}

#controls{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.btn-row:last-child{margin-bottom:0}
.btn{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.btn:hover{border-color:var(--cyan);color:var(--bright)}
.btn:active{transform:scale(.96)}
.btn.primary{border-color:var(--cyan);color:var(--cyan)}
.btn.warn{border-color:var(--yellow);color:var(--yellow)}
.btn.danger{border-color:var(--red);color:var(--red)}
.input-inline{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:5px 10px;border-radius:4px;font-family:inherit;font-size:13px;width:80px;text-align:center}
.input-inline:focus{outline:none;border-color:var(--cyan)}
.input-inline::placeholder{color:var(--dim)}
.label{color:var(--dim);font-size:12px}
.sep{color:var(--border);margin:0 4px;user-select:none}

#settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
#settings-modal.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;width:400px;max-width:90vw}
.modal h2{color:var(--cyan);margin-bottom:16px;font-size:16px}
.modal label{display:block;color:var(--dim);font-size:12px;margin-bottom:4px;margin-top:12px}
.modal input[type=text],.modal input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:8px 12px;border-radius:4px;font-family:inherit;font-size:13px}
.modal input:focus{outline:none;border-color:var(--cyan)}
.modal .actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}

@media(max-width:600px){
  #terminal{padding:12px;font-size:13px}
  .btn{padding:5px 10px;font-size:12px}
  .input-inline{width:60px}
}
</style>
</head>
<body>

<header>
  <div class="logo">☀ <span>vitd</span></div>
  <div class="subtitle">Vitamin D Tracker</div>
  <div class="sync-status">
    <div class="dot" id="syncDot"></div>
    <span id="syncLabel">offline</span>
  </div>
</header>

<div id="terminal"></div>

<div id="controls">
  <div class="btn-row">
    <button class="btn primary" onclick="cmdStatus()">status</button>
    <button class="btn" onclick="cmdRemind()">remind</button>
    <button class="btn" onclick="cmdTips()">tips</button>
    <button class="btn" onclick="cmdHistory()">history</button>
    <button class="btn" onclick="openSettings()" style="margin-left:auto">⚙ sync</button>
  </div>
  <div class="btn-row">
    <span class="label">☀ sun</span>
    <input type="number" class="input-inline" id="sunMin" placeholder="min" min="1">
    <button class="btn" onclick="cmdSun()">log</button>
    <span class="sep">|</span>
    <span class="label">💊 supp</span>
    <input type="number" class="input-inline" id="suppIU" placeholder="IU" min="1">
    <button class="btn" onclick="cmdSupp()">log</button>
    <span class="sep">|</span>
    <span class="label">🧪 test</span>
    <input type="number" class="input-inline" id="testLevel" placeholder="ng/mL" min="0" step="0.1">
    <button class="btn" onclick="cmdTest()">log</button>
    <span class="sep">|</span>
    <span class="label">📝 note</span>
    <input type="text" class="input-inline" id="noteText" placeholder="text" style="width:120px">
    <button class="btn" onclick="cmdNote()">log</button>
  </div>
</div>

<div id="settings-modal">
  <div class="modal">
    <h2>⚙ GitHub Gist Sync</h2>
    <p class="dim" style="font-size:12px">Sync your vitd data across devices via a GitHub Gist. Your token is stored in browser localStorage only.</p>
    <label>GitHub Personal Access Token</label>
    <input type="password" id="ghToken" placeholder="ghp_...">
    <label>Gist ID <span class="dim">(leave empty to auto-create)</span></label>
    <input type="text" id="ghGistId" placeholder="gist id">
    <div class="actions">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn" onclick="disconnectSync()" style="color:var(--red)">Disconnect</button>
      <button class="btn primary" onclick="saveSettings()">Save &amp; Sync</button>
    </div>
  </div>
</div>

<script>
const SEVERE=10,DEFICIENT=20,INSUFFICIENT=30,SUFFICIENT=50,OPTIMAL=60,TOXIC=100;
const LEVEL_LABELS=[[0,SEVERE,"SEVERE DEFICIENCY"],[SEVERE,DEFICIENT,"DEFICIENT"],[DEFICIENT,INSUFFICIENT,"INSUFFICIENT"],[INSUFFICIENT,SUFFICIENT,"LOW NORMAL"],[SUFFICIENT,OPTIMAL,"NORMAL"],[OPTIMAL,TOXIC,"OPTIMAL"],[TOXIC,500,"TOXIC - SEEK MEDICAL HELP"]];

function levelLabel(v){for(const[lo,hi,l]of LEVEL_LABELS)if(v>=lo&&v<hi)return l;return"UNKNOWN"}
function levelColor(v){if(v<SEVERE)return"red";if(v<DEFICIENT)return"red";if(v<INSUFFICIENT)return"yellow";if(v<SUFFICIENT)return"yellow";if(v<TOXIC)return"green";return"red"}
function isDeficient(l){return l!=null&&l<30}
function sunTarget(l){return isDeficient(l)?20:15}
function suppTarget(l){return isDeficient(l)?2000:1000}
function bar(cur,tgt,w=30){const r=Math.min(cur/tgt,1)||0,f=Math.round(r*w);return`[${"█".repeat(f)}${"░".repeat(w-f)}] ${cur}/${tgt}`}
function todayKey(){return new Date().toISOString().slice(0,10)}
function nowHHMM(){return new Date().toTimeString().slice(0,5)}

function loadData(){
  const d=localStorage.getItem("vitd_data");
  if(!d)return{tests:[],daily:{}};
  try{return JSON.parse(d)}catch{return{tests:[],daily:{}}}
}
function saveData(data){localStorage.setItem("vitd_data",JSON.stringify(data))}
function getToday(data){const k=todayKey();if(!data.daily[k])data.daily[k]={sun_minutes:0,supplements:[],notes:[]};return data.daily[k]}
function latestLevel(data){return data.tests.length?data.tests[data.tests.length-1].level:null}

const term=document.getElementById("terminal");

function c(text,cls){return cls?`<span class="${cls}">${text}</span>`:text}
function print(html){const div=document.createElement("div");div.className="line";div.innerHTML=html;term.appendChild(div);term.scrollTop=term.scrollHeight}
function prompt(cmd){print(`${c("❯","cyan")} ${c(cmd,"bright")}`)}
function separator(){print(`${"─".repeat(40)}`)}

function cmdStatus(){
  prompt("vitd status");
  const data=loadData(),today=getToday(data),level=latestLevel(data),color=level?levelColor(level):"";
  print("");
  print(`  ${c("☀  Vitamin D Dashboard","bold")}`);
  print(`  ${"─".repeat(38)}`);
  if(level){
    print(`  Latest Level:  ${c(`${level} ng/mL`,color+" bold")}  (${c(levelLabel(level),color)})`);
    print(`  To Sufficiency:${c(bar(level,30),"green")}`);
    if(level<INSUFFICIENT){const deficit=30-level,weeks=Math.max(1,Math.round(deficit/5));print(`  Est. Recovery: ${c(`~${weeks} weeks`,"cyan")} with proper supplementation`)}
  }else{print(`  ${c("No test results logged yet. Use the 🧪 test button above.","dim")}`)}
  print("");
  const st=sunTarget(level);
  print(`  Sun Today:     ${c(bar(today.sun_minutes,st),"yellow")} min`);
  const suppTotal=today.supplements.reduce((a,s)=>a+s.iu,0),dt=suppTarget(level);
  print(`  Supplement:    ${c(bar(suppTotal,dt),"blue")} IU`);
  if(today.notes.length){print("");print(`  ${c("Notes:","dim")}`);for(const n of today.notes)print(`    ${c("•","dim")} ${c(n,"dim")}`)}
  print("");
}

function cmdSun(){
  const el=document.getElementById("sunMin"),min=parseInt(el.value);
  if(!min||min<1){print(`${c("⚠ Enter minutes of sun exposure","red")}`);return}
  prompt(`vitd sun ${min}`);
  const data=loadData(),today=getToday(data);
  today.sun_minutes+=min;saveData(data);syncUp();
  const level=latestLevel(data),st=sunTarget(level),rem=Math.max(0,st-today.sun_minutes);
  if(rem>0)print(`  ☀  Logged ${c(`${min} min`,"yellow")} sun. ${c(`${rem} min more`,"cyan")} to hit today's target.`);
  else print(`  ☀  Logged ${c(`${min} min`,"yellow")} sun. ${c("Target reached!","green")}`);
  el.value="";
}

function cmdSupp(){
  const el=document.getElementById("suppIU"),iu=parseInt(el.value);
  if(!iu||iu<1){print(`${c("⚠ Enter IU of Vitamin D3","red")}`);return}
  prompt(`vitd supp ${iu}`);
  const data=loadData(),today=getToday(data);
  today.supplements.push({iu,time:nowHHMM()});saveData(data);syncUp();
  print(`  💊 Logged ${c(`${iu} IU`,"blue")} supplement.`);
  el.value="";
}

function cmdTest(){
  const el=document.getElementById("testLevel"),level=parseFloat(el.value);
  if(isNaN(level)||level<0){print(`${c("⚠ Enter your Vitamin D level in ng/mL","red")}`);return}
  prompt(`vitd test ${level}`);
  const data=loadData();
  data.tests.push({date:todayKey(),level});saveData(data);syncUp();
  const color=levelColor(level),label=levelLabel(level);
  print(``);
  print(`  🧪 Test result: ${c(`${level} ng/mL`,color+" bold")} (${c(label,color)})`);
  if(level<SEVERE)print(`  ${c("⚠  Critical! See a doctor immediately for prescription loading doses.","red")}`);
  else if(level<DEFICIENT)print(`  ${c("⚠  Severe deficiency. Prescription supplements likely needed.","red")}`);
  else if(level<INSUFFICIENT)print(`  ${c("⚠  Deficient. High-dose OTC or prescription recommended.","yellow")}`);
  else if(level<SUFFICIENT)print(`  ${c("⚠  Insufficient. Daily supplementation recommended.","yellow")}`);
  else print(`  ${c("✓  Good levels. Maintain with daily supplements and sun.","green")}`);
  print("");el.value="";
}

function cmdNote(){
  const el=document.getElementById("noteText"),text=el.value.trim();
  if(!text){print(`${c("⚠ Enter a note","red")}`);return}
  prompt(`vitd note "${text}"`);
  const data=loadData(),today=getToday(data);
  today.notes.push(text);saveData(data);syncUp();
  print(`  📝 Note saved.`);el.value="";
}

function cmdRemind(){
  prompt("vitd remind");
  const data=loadData(),today=getToday(data),hour=new Date().getHours(),level=latestLevel(data),st=sunTarget(level);
  print("");print(`  ${c("🔔 Reminders","bold")}`);
  print(`  ${"─".repeat(30)}`);
  const reminders=[];
  if(hour>=10&&hour<=14&&today.sun_minutes<st){const rem=st-today.sun_minutes;reminders.push(`☀  Step outside NOW! UV is at peak. Need ${rem} more min of sun.`)}
  if(hour>=14&&today.sun_minutes<st){const rem=st-today.sun_minutes;reminders.push(`☀  You missed peak sun hours. Try to get ${rem} min tomorrow 10am-2pm.`)}
  if(hour<10)reminders.push(`☀  Peak sun window is 10am-2pm. Set an alert for later!`);
  const suppTotal=today.supplements.reduce((a,s)=>a+s.iu,0),dt=suppTarget(level);
  if(suppTotal<dt){const rem=dt-suppTotal;reminders.push(`💊 Take your Vitamin D supplement (${rem} IU remaining today).`)}
  if(isDeficient(level)){reminders.push("🩺 Book a follow-up blood test in 6-8 weeks.");reminders.push("🥛 Include calcium-rich foods with your supplement.")}
  if(!reminders.length)print(`  ${c("All caught up! Nothing pending right now.","green")}`);
  else for(const r of reminders)print(`  ${r}`);
  print("");
}

function cmdHistory(){
  prompt("vitd history");
  const data=loadData(),days=7;
  print("");print(`  ${c("📋 Last 7 Days","bold")}`);
  print(`  ${"─".repeat(50)}`);
  print(`  ${"Date".padEnd(12)} ☀ Sun   💊 Supp   Notes`);
  print(`  ${"─".repeat(50)}`);
  for(let i=0;i<days;i++){
    const d=new Date(Date.now()-i*864e5).toISOString().slice(0,10);
    if(data.daily[d]){
      const e=data.daily[d],supp=e.supplements.reduce((a,s)=>a+s.iu,0),notes=e.notes.slice(0,2).join(", "),mk=e.sun_minutes>=15?c("✓","green"):c("✗","red");
      print(`  ${d.padEnd(12)} ${mk} ${String(e.sun_minutes).padStart(4)}m  ${String(supp).padStart(6)} IU  ${notes}`);
    }else{print(`  ${d.padEnd(12)} ${c("✗   —       — IU","dim")}`)}
  }
  print("");
  if(data.tests.length){print(`  ${c("Test History:","bold")}`);for(const t of data.tests)print(`  ${t.date}  ${c(`${t.level} ng/mL`,levelColor(t.level))} (${levelLabel(t.level)})`);print("")}
}

function cmdTips(){
  prompt("vitd tips");
  const data=loadData(),level=latestLevel(data);
  print("");print(`  ${c("💡 Personalized Tips","bold")}`);print(`  ${"─".repeat(40)}`);
  if(level!=null&&level<INSUFFICIENT){
    print(`
  Your level (${level} ng/mL) is ${c("critically low","red")}. Action plan:

  ${c("Supplements:","bold")}
    • Take 2000-4000 IU D3 daily (or as prescribed)
    • Take with the ${c("largest meal","bold")} of the day (fat improves absorption)
    • Pair with K2 (100mcg) to direct calcium to bones
    • Don't take on empty stomach — waste of money

  ${c("Sun:","bold")}
    • 20-30 min midday sun (10am-2pm) on bare arms/face
    • Darker skin = more time needed
    • Glass blocks UV-B — step ${c("outside","bold")}, not just near a window
    • Clouds reduce UV by only ~20-30%

  ${c("Diet:","bold")}
    • Fatty fish (salmon, sardines, mackerel) — 2-3x/week
    • Egg yolks, fortified milk, fortified cereals
    • UV-exposed mushrooms (leave them in sun 15 min before cooking)

  ${c("Lifestyle:","bold")}
    • Set a daily alarm: "vitamin D" at noon
    • Walk during lunch break — counts as sun + exercise
    • Re-test in 6-8 weeks

  ${c("Medical:","bold")}
    • If level < 10, ask about prescription loading doses
    • Get calcium and B12 checked too
    • Magnesium helps D activation — consider supplementing`);
  }else if(level!=null&&level<SUFFICIENT){
    print(`
  Your level (${level} ng/mL) is ${c("below optimal","yellow")}.

  • Take 1000-2000 IU D3 daily with a meal
  • 15 min midday sun on exposed skin, 3-4x/week
  • Re-test in 3 months`);
  }else if(level!=null){
    print(`
  Your level (${level} ng/mL) is ${c("good","green")}!

  • Maintain with 1000 IU D3 daily
  • Keep getting regular sun exposure
  • Test annually`);
  }else{
    print(`
  ${c("Log your test result first using the 🧪 test button above.","dim")}

  General tips:
  • 15-20 min midday sun, 3-4x/week
  • 1000-2000 IU D3 daily with a fatty meal
  • Re-test every 3-6 months`);
  }
  print("");
}

function cmdSetup(level){
  const data=loadData();
  if(!data.tests.length){data.tests.push({date:todayKey(),level});saveData(data);syncUp()}
  print(`  ${c("✓ Setup complete!","green")}`);
  print(`  Vitamin D level set to: ${c(`${level} ng/mL`,levelColor(level)+" bold")} (${levelLabel(level)})`);
  print("");
}

function openSettings(){document.getElementById("settings-modal").classList.add("open");const s=loadSync();document.getElementById("ghToken").value=s.token||"";document.getElementById("ghGistId").value=s.gistId||""}
function closeSettings(){document.getElementById("settings-modal").classList.remove("open")}

function loadSync(){try{return JSON.parse(localStorage.getItem("vitd_sync")||"{}")}catch{return{}}}
function saveSync(s){localStorage.setItem("vitd_sync",JSON.stringify(s))}

function disconnectSync(){localStorage.removeItem("vitd_sync");updateSyncDot("offline");closeSettings();print(`  ${c("⛔ Sync disconnected.","yellow")}`)}

async function saveSettings(){
  const token=document.getElementById("ghToken").value.trim(),gistId=document.getElementById("ghGistId").value.trim();
  if(!token){print(`${c("⚠ Token is required","red")}`);return}
  saveSync({token,gistId});closeSettings();
  await syncUp();
}

async function syncUp(){
  const s=loadSync();if(!s.token)return;
  updateSyncDot("syncing");
  const data=loadData();
  try{
    let gistId=s.gistId;
    if(!gistId){
      const res=await fetch("https://api.github.com/gists",{method:"POST",headers:{Authorization:`token ${s.token}`,"Content-Type":"application/json"},body:JSON.stringify({description:"vitd data sync",public:false,files:{"data.json":{content:JSON.stringify(data,null,2)}}})});
      if(!res.ok)throw new Error(`create failed: ${res.status}`);
      const g=await res.json();gistId=g.id;s.gistId=gistId;saveSync(s);
    }else{
      const res=await fetch(`https://api.github.com/gists/${gistId}`,{method:"PATCH",headers:{Authorization:`token ${s.token}`,"Content-Type":"application/json"},body:JSON.stringify({files:{"data.json":{content:JSON.stringify(data,null,2)}}})});
      if(!res.ok)throw new Error(`update failed: ${res.status}`);
    }
    updateSyncDot("ok");document.getElementById("syncLabel").textContent=`synced ${new Date().toLocaleTimeString()}`;
  }catch(e){updateSyncDot("err");document.getElementById("syncLabel").textContent="sync error";print(`  ${c(`⚠ Sync failed: ${e.message}`,"red")}`)}
}

async function syncDown(){
  const s=loadSync();if(!s.token||!s.gistId)return;
  updateSyncDot("syncing");
  try{
    const res=await fetch(`https://api.github.com/gists/${s.gistId}`,{headers:{Authorization:`token ${s.token}`}});
    if(!res.ok)throw new Error(`${res.status}`);
    const g=await res.json(),remote=JSON.parse(g.files["data.json"].content);
    const local=loadData();
    const merged=mergeData(local,remote);
    saveData(merged);updateSyncDot("ok");document.getElementById("syncLabel").textContent=`synced ${new Date().toLocaleTimeString()}`;
  }catch(e){updateSyncDot("err");document.getElementById("syncLabel").textContent="sync error"}
}

function mergeData(local,remote){
  const allTests=[...local.tests,...remote.tests];
  const seen=new Set();const tests=[];
  for(const t of allTests){const k=`${t.date}:${t.level}`;if(!seen.has(k)){seen.add(k);tests.push(t)}}
  tests.sort((a,b)=>a.date.localeCompare(b.date));
  const daily={...remote.daily};
  for(const[date,entry]of Object.entries(local.daily)){
    if(!daily[date]){daily[date]=entry}
    else{daily[date].sun_minutes=Math.max(daily[date].sun_minutes,entry.sun_minutes);
      const suppIU=new Set(entry.supplements.map(s=>`${s.iu}:${s.time}`));
      for(const s of entry.supplements){if(!daily[date].supplements.some(e=>`${e.iu}:${e.time}`===`${s.iu}:${s.time}`))daily[date].supplements.push(s)}
      for(const n of entry.notes){if(!daily[date].notes.includes(n))daily[date].notes.push(n)}
    }
  }
  return{tests,daily}
}

function updateSyncDot(state){const dot=document.getElementById("syncDot");dot.className="dot";if(state==="ok")dot.classList.add("ok");else if(state==="err")dot.classList.add("err");else if(state==="syncing")dot.classList.add("syncing")}

const data=loadData();
if(!data.tests.length){
  const level=parseFloat(new URLSearchParams(location.search).get("level"));
  if(level&&!isNaN(level)){cmdSetup(level)}
  else{print(`\n  ${c("☀  Welcome to vitd","bold cyan")}\n  ${c("─".repeat(38))}\n\n  Enter your latest Vitamin D test result using the\n  ${c("🧪 test","cyan")} button above to get started.\n\n  Example: type ${c("10.8","yellow")} in the test field and click ${c("log","cyan")}.\n`)}
else{cmdStatus()}

syncDown();
</script>
</body>
</html>
